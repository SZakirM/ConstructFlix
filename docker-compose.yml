version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: constructflix_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - constructflix_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    container_name: constructflix_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - constructflix_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: constructflix_web
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      DOMAIN: ${DOMAIN}
    volumes:
      - static_volume:/app/app/static/uploads
      - ./logs:/app/logs
    networks:
      - constructflix_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: constructflix_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - static_volume:/static:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - constructflix_network

  celery:
    build: .
    container_name: constructflix_celery
    restart: always
    command: celery -A app.tasks.celery worker --loglevel=info
    depends_on:
      - redis
      - web
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
    networks:
      - constructflix_network

  celery-beat:
    build: .
    container_name: constructflix_celery_beat
    restart: always
    command: celery -A app.tasks.celery beat --loglevel=info
    depends_on:
      - redis
      - web
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    networks:
      - constructflix_network

volumes:
  postgres_data:
  redis_data:
  static_volume:

networks:
  constructflix_network:
    driver: bridge