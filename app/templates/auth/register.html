{% extends "base.html" %}

{% block title %}Sign Up - ConstructFlix{% endblock %}

{% block content %}
<div class="row-container" style="min-height: 80vh; display: flex; align-items: center;">
    <div style="width: 100%; max-width: 450px; margin: 0 auto;">
        <div style="background: rgba(0,0,0,0.75); padding: 60px; border-radius: 8px;">
            <h1 class="row-title" style="font-size: 32px; margin-bottom: 30px;">Sign Up</h1>
            
            <form method="POST" action="{{ url_for('auth.register') }}">
                {{ form.hidden_tag() }}
                
                <div class="form-group">
                    <input type="text" name="first_name" class="form-control" placeholder="First name" required
                           style="background: #333; border: none; padding: 16px;">
                </div>
                
                <div class="form-group">
                    <input type="text" name="last_name" class="form-control" placeholder="Last name" required
                           style="background: #333; border: none; padding: 16px;">
                </div>
                
                <div class="form-group">
                    <input type="text" name="username" class="form-control" placeholder="Username" required
                           style="background: #333; border: none; padding: 16px;">
                </div>
                
                <div class="form-group">
                    <input type="email" name="email" class="form-control" placeholder="Email" required
                           style="background: #333; border: none; padding: 16px;">
                </div>
                
                <div class="form-group">
                    <input type="password" name="password" class="form-control" placeholder="Password" required
                           style="background: #333; border: none; padding: 16px;">
                </div>
                
                <div class="form-group">
                    <input type="password" name="password2" class="form-control" placeholder="Confirm Password" required
                           style="background: #333; border: none; padding: 16px;">
                </div>
                
                <div class="form-group">
                    <input type="text" name="company" class="form-control" placeholder="Company (optional)"
                           style="background: #333; border: none; padding: 16px;">
                </div>
                
                <div class="form-group" style="margin-bottom: 30px;">
                    <label style="color: #b3b3b3; font-size: 14px;">
                        <input type="checkbox" name="agree_terms" required> I agree to the 
                        <a href="#" style="color: #0071eb;">Terms of Service</a> and 
                        <a href="#" style="color: #0071eb;">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" class="btn-netflix" style="width: 100%; padding: 16px; font-size: 16px;">
                    Sign Up
                </button>
            </form>
            
            <div style="margin-top: 30px; color: #b3b3b3; text-align: center;">
                <p>Already have an account? 
                    <a href="{{ url_for('auth.login') }}" style="color: #fff; text-decoration: none; font-weight: 600;">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    // Password strength checker
    document.querySelector('input[name="password"]').addEventListener('input', function() {
        const password = this.value;
        const strengthIndicator = document.createElement('div');
        
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.match(/[A-Z]/)) strength++;
        if (password.match(/[a-z]/)) strength++;
        if (password.match(/[0-9]/)) strength++;
        if (password.match(/[^A-Za-z0-9]/)) strength++;
        
        const strengthText = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
        const colors = ['#dc3545', '#fd7e14', '#ffc107', '#28a745', '#28a745'];
        
        let indicator = this.parentNode.querySelector('.strength-indicator');
        if (!indicator) {
            indicator = document.createElement('div');
            indicator.className = 'strength-indicator';
            this.parentNode.appendChild(indicator);
        }
        
        indicator.style.marginTop = '10px';
        indicator.style.padding = '5px 10px';
        indicator.style.borderRadius = '4px';
        indicator.style.background = colors[strength];
        indicator.style.color = '#fff';
        indicator.style.fontSize = '12px';
        indicator.textContent = `Password Strength: ${strengthText[strength]}`;
        
        if (strength === 0) indicator.style.display = 'none';
        else indicator.style.display = 'block';
    });
</script>
{% endblock %}
